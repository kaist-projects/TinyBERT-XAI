# Example: the kd_full condition (all three KD signals) on IMDB.
# Omitted keys fall back to Config() / locked defaults, so only the run-level
# choices need to appear here. Training always evaluates on dev/test.
#
#   python scripts/02_train_student.py --config configs/kd_full.yaml
#
# Override anything from the CLI, e.g. --attn-weight 152.

run:
  dataset: imdb
  conditions:
    logit: true
    hidden: true
    attention: true
